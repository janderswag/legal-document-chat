# Deploy the landing page (site/) to GitHub Pages.
# WIRED, NOT AUTOMATIC: workflow_dispatch only — it never deploys on push (D-58 v1: deploy
# is a later, deliberate step). Run it manually from the Actions tab when ready to publish.
name: Deploy landing page

on:
  workflow_dispatch: {}

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: site
      - id: deployment
        uses: actions/deploy-pages@v4
