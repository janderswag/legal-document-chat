<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Legal Document Chat — live demo</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600&family=Newsreader:ital,opsz,wght@0,6..72,400;0,6..72,500;1,6..72,400&family=IBM+Plex+Mono:wght@500&display=swap" rel="stylesheet">
<style>
  :root{
    --ink:#241f17; --oxblood:#7b2a25; --gold:#b8943f; --gold-deep:#9a7a2f;
    --local:#3f8a63; --paper:#f1ece1; --card:#fff; --rule:#e6ddcb; --muted:#8c8472;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%;overflow:hidden;background:#fff;font-family:"Newsreader",Georgia,serif}
  #stagewrap{position:absolute;inset:0;overflow:hidden}
  .stage{position:absolute;top:0;left:0;width:1120px;height:700px;transform-origin:0 0;
    display:grid;grid-template-columns:268px 1fr;background:var(--paper);color:var(--ink)}

  /* sidebar */
  .side{background:linear-gradient(180deg,#241f1a,#100e0a);color:#e9e2d4;display:flex;flex-direction:column;padding:20px 16px}
  .brand{display:flex;align-items:center;gap:11px;padding:4px 6px 16px}
  .logo{width:38px;height:38px;border-radius:9px;background:var(--oxblood);display:grid;place-items:center;
    font-family:"Fraunces",serif;font-weight:600;font-size:22px;color:#f3ecdd;box-shadow:inset 0 0 0 1px rgba(255,255,255,.12)}
  .brand b{font-family:"Fraunces",serif;font-weight:600;font-size:17px;letter-spacing:-.01em;line-height:1.05;display:block}
  .pill-local{display:inline-flex;align-items:center;gap:5px;margin-top:5px;font-family:"IBM Plex Mono",monospace;
    font-size:9.5px;letter-spacing:.12em;color:#7fd0a3;background:rgba(63,138,99,.16);padding:2px 7px;border-radius:20px}
  .pill-local::before{content:"";width:6px;height:6px;border-radius:50%;background:#56c98c;box-shadow:0 0 8px #56c98c}
  nav{margin-top:14px;display:flex;flex-direction:column;gap:3px}
  .nav-i{display:flex;align-items:center;gap:12px;padding:10px 12px;border-radius:9px;color:#bdb4a2;font-size:15.5px}
  .nav-i svg{width:17px;height:17px;stroke:currentColor;fill:none;stroke-width:1.7;opacity:.85}
  .nav-i.active{background:#2f2920;color:#f4eddd}
  .side-foot{margin-top:auto;padding:14px 8px 4px;border-top:1px solid #2a241b}
  .side-foot small{font-family:"IBM Plex Mono",monospace;font-size:9px;letter-spacing:.16em;color:#7c7460;text-transform:uppercase}
  .side-foot div{font-family:"Fraunces",serif;font-style:italic;font-size:15px;color:#cfc6b2;margin-top:3px}

  /* main */
  .main{display:flex;flex-direction:column;min-width:0;position:relative}
  .topbar{display:flex;align-items:center;gap:14px;padding:18px 28px;border-bottom:1px solid var(--rule)}
  .topbar .lab{font-family:"IBM Plex Mono",monospace;font-size:11px;letter-spacing:.14em;color:var(--muted);text-transform:uppercase}
  .matter-sel{flex:1;max-width:560px;display:flex;align-items:center;justify-content:space-between;
    background:#fff;border:1px solid var(--rule);border-radius:11px;padding:11px 16px;font-size:16px;color:var(--ink);box-shadow:0 1px 0 rgba(0,0,0,.02)}
  .matter-sel .chev{color:var(--muted)}
  .newchat{margin-left:auto;border:1px solid var(--rule);background:#fff;border-radius:10px;padding:10px 16px;font-size:15px;color:var(--ink)}

  .chat{flex:1;overflow:hidden;padding:26px 30px 8px;display:flex;flex-direction:column;gap:20px}
  .row{display:flex}
  .row.user{justify-content:flex-end}
  .bubble{background:var(--gold);color:#3a2e09;border-radius:14px;padding:13px 18px;font-size:16px;max-width:560px;
    box-shadow:0 8px 22px -14px rgba(154,122,47,.6)}
  .ans{background:var(--card);border:1px solid var(--rule);border-radius:14px;padding:20px 22px;max-width:840px;
    box-shadow:0 10px 30px -22px rgba(40,28,18,.4)}
  .ans p{font-size:16px;line-height:1.62;color:#33301f}
  .ans .sep{height:1px;background:var(--rule);margin:14px 0 12px}
  .src{font-size:14px;color:var(--muted);display:flex;align-items:center;gap:9px;flex-wrap:wrap}
  .chip{font-family:"Newsreader",serif;font-size:13.5px;color:var(--oxblood);background:#efe7d3;
    border:1px solid #e3d6b4;border-radius:8px;padding:4px 11px}
  .chip.pulse{animation:chip 1.5s ease}
  @keyframes chip{0%{box-shadow:0 0 0 0 rgba(123,42,37,.0)}30%{box-shadow:0 0 0 4px rgba(123,42,37,.18)}100%{box-shadow:0 0 0 0 rgba(123,42,37,0)}}
  .dots span{display:inline-block;width:7px;height:7px;margin-right:5px;border-radius:50%;background:#c3b896;animation:b 1s infinite}
  .dots span:nth-child(2){animation-delay:.15s}.dots span:nth-child(3){animation-delay:.3s}
  @keyframes b{0%,80%,100%{opacity:.3;transform:translateY(0)}40%{opacity:1;transform:translateY(-3px)}}

  .composer{margin:auto 30px 26px;display:flex;align-items:center;gap:0;background:#fff;border:1px solid var(--rule);
    border-radius:14px;padding:6px 6px 6px 20px;box-shadow:0 10px 30px -22px rgba(40,28,18,.4)}
  .field{flex:1;font-size:17px;color:var(--ink);padding:12px 0;min-height:24px}
  .field .ph{color:#a79e89}
  .caret{display:inline-block;width:2px;height:20px;background:var(--gold-deep);vertical-align:-4px;margin-left:1px;animation:blink 1s steps(1) infinite}
  @keyframes blink{50%{opacity:0}}
  .ask{background:var(--gold);color:#3a2e09;border-radius:10px;padding:12px 20px;font-size:16px;font-weight:500;white-space:nowrap}
  .ask.press{animation:press .25s ease}
  @keyframes press{50%{transform:scale(.95);filter:brightness(.95)}}

  .reveal-w{opacity:0;animation:fadein .45s ease forwards}
  @keyframes fadein{to{opacity:1}}
  .fade-out{animation:fo .5s ease forwards}
  @keyframes fo{to{opacity:0;transform:translateY(-6px)}}
</style>
</head>
<body>
<div id="stagewrap">
  <div class="stage" id="stage">
    <!-- SIDEBAR -->
    <aside class="side">
      <div class="brand">
        <div class="logo">§</div>
        <div>
          <b>Legal&nbsp;Document&nbsp;Chat</b>
          <span class="pill-local">100% LOCAL</span>
        </div>
      </div>
      <nav>
        <div class="nav-i active"><svg viewBox="0 0 24 24"><path d="M4 5h16v11H8l-4 3z"/></svg>New Chat</div>
        <div class="nav-i"><svg viewBox="0 0 24 24"><path d="M4 4h7v7H4zM13 4h7v7h-7zM4 13h7v7H4zM13 13h7v7h-7z"/></svg>Matters</div>
        <div class="nav-i"><svg viewBox="0 0 24 24"><path d="M7 3h7l5 5v13H7z"/><path d="M14 3v5h5"/></svg>Document Hub</div>
        <div class="nav-i"><svg viewBox="0 0 24 24"><path d="M5 4h14v16H5z"/><path d="M9 12l2 2 4-4"/></svg>Contract Review</div>
        <div class="nav-i"><svg viewBox="0 0 24 24"><path d="M4 5h7v14H4zM13 5h7v14h-7z"/></svg>Compare Documents</div>
        <div class="nav-i"><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="8"/><path d="M12 8v4l3 2"/></svg>Chat History</div>
        <div class="nav-i"><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="3"/><path d="M12 3v3M12 18v3M3 12h3M18 12h3M5 5l2 2M17 17l2 2M19 5l-2 2M7 17l-2 2"/></svg>Settings</div>
      </nav>
      <div class="side-foot">
        <small>Active matter</small>
        <div>Pemberton MSA</div>
      </div>
    </aside>

    <!-- MAIN -->
    <div class="main">
      <div class="topbar">
        <span class="lab">Matter</span>
        <div class="matter-sel"><span>Pemberton MSA (3 docs)</span><span class="chev">▾</span></div>
        <button class="newchat">+ New chat</button>
      </div>

      <div class="chat" id="chat"></div>

      <div class="composer">
        <div class="field" id="field"><span class="ph" id="ph">Ask a question about this matter…</span><span class="caret" id="caret" style="display:none"></span></div>
        <button class="ask" id="ask">Ask&nbsp;→</button>
      </div>
    </div>
  </div>
</div>

<script>
// ---- fit the fixed 1120x700 stage into whatever size the iframe/window is ----
const stage = document.getElementById('stage');
function fit(){
  const s = Math.min(window.innerWidth/1120, window.innerHeight/700);
  stage.style.transform = 'scale('+s+')';
  // center horizontally if there's slack
  const offx = Math.max(0,(window.innerWidth - 1120*s)/2);
  const offy = Math.max(0,(window.innerHeight - 700*s)/2);
  stage.style.left = offx+'px'; stage.style.top = offy+'px';
}
window.addEventListener('resize', fit); fit();

const chat = document.getElementById('chat');
const field = document.getElementById('field');
const ph = document.getElementById('ph');
const caret = document.getElementById('caret');
const ask = document.getElementById('ask');
const wait = ms => new Promise(r=>setTimeout(r,ms));

const QUESTION = "What are the indemnification obligations, and where are they stated?";
const ANSWER = [
  "The agreement imposes ","**mutual** ","indemnification. ","Each party ","(the “Indemnifying Party”) ",
  "must “defend, ","indemnify, ","and hold harmless” ","the other party, ","its officers, ","directors, ",
  "and employees ","from third-party claims, ","damages, ","and reasonable ","attorneys’ fees ",
  "arising out of ","that party’s ","gross negligence, ","willful misconduct, ","or breach."
];

function typeNode(){ // returns a span we grow
  ph.style.display='none'; caret.style.display='inline-block';
  let t=document.createElement('span'); t.id='typed';
  field.insertBefore(t, caret); return t;
}

async function typeText(node, text, perChar){
  for(let i=0;i<text.length;i++){ node.textContent += text[i]; await wait(perChar + (text[i]===' '?12:0)); }
}

function bubble(text){
  const row=document.createElement('div'); row.className='row user';
  const b=document.createElement('div'); b.className='bubble'; b.textContent=text;
  row.appendChild(b); chat.appendChild(row); return row;
}
function answerShell(){
  const row=document.createElement('div'); row.className='row';
  const a=document.createElement('div'); a.className='ans';
  a.innerHTML='<div class="dots"><span></span><span></span><span></span></div>';
  row.appendChild(a); chat.appendChild(row); return a;
}

async function streamAnswer(a){
  a.innerHTML=''; const p=document.createElement('p'); a.appendChild(p);
  for(const w of ANSWER){
    const s=document.createElement('span'); s.className='reveal-w';
    if(w.startsWith('**')){ const b=document.createElement('strong'); b.textContent=w.replace(/\*\*/g,''); s.appendChild(b); }
    else s.textContent=w;
    p.appendChild(s); await wait(105);
  }
  await wait(250);
  const sep=document.createElement('div'); sep.className='sep'; a.appendChild(sep);
  const src=document.createElement('div'); src.className='src';
  src.innerHTML='Sources: <span class="chip pulse">SYNTHETIC_Pemberton_MSA.pdf&nbsp;·&nbsp;p.1&nbsp;·&nbsp;§4 Indemnification</span>';
  a.appendChild(src);
}

async function run(){
  while(true){
    // reset
    chat.innerHTML=''; field.querySelector('#typed')?.remove();
    ph.style.display='inline'; caret.style.display='none';
    await wait(900);

    // type the question
    const t=typeNode();
    await typeText(t, QUESTION, 34);
    await wait(450);

    // ask
    ask.classList.add('press'); await wait(120);
    t.remove(); ph.style.display='inline'; caret.style.display='none'; ask.classList.remove('press');
    bubble(QUESTION);
    await wait(550);

    // thinking → answer
    const a=answerShell();
    await wait(1100);
    await streamAnswer(a);

    // hold, then fade out and loop
    await wait(2600);
    chat.querySelectorAll('.row').forEach(r=>r.classList.add('fade-out'));
    await wait(600);
  }
}
run();
</script>
</body>
</html>
